retargeting:
  type: vector
  urdf_path: linkerhand_l20/left/linkerhand_l20_left.urdf

  # 只优化主动关节，mimic 的 DIP 不写进去
  target_joint_names:
    # thumb: 下面 4 个名字请按你的 URDF 实际名字核对
    - thumb_cmc_yaw
    - thumb_cmc_pitch
    - thumb_cmc_roll
    - thumb_mcp

    - index_mcp_roll
    - index_mcp_pitch
    - index_pip

    - middle_mcp_roll
    - middle_mcp_pitch
    - middle_pip

    - ring_mcp_roll
    - ring_mcp_pitch
    - ring_pip

    - pinky_mcp_roll
    - pinky_mcp_pitch
    - pinky_pip

  target_origin_link_names:
  - hand_base_link
  - thumb_metacarpals
  - thumb_proximal
  - index_proximal
  - middle_proximal
  - ring_proximal
  - pinky_proximal

  # 
  target_task_link_names:
  - thumb_metacarpals_base2
  - thumb_proximal
  - thumb_distal
  - index_distal
  - middle_distal
  - ring_distal
  - pinky_distal


  target_link_human_indices:
  - [0, 1, 3, 5, 9, 13, 17] # 分别是大拇指CMC/食指MCP/中指MCP/无名指MCP/小拇指MCP
  - [3, 2, 4, 8, 12, 16, 20] # 依然是五个指尖

  scaling_factor: 1.0
  low_pass_alpha: 0.2