# retargeting:
#   type: DexPilot
#   urdf_path: linkerhand_l20/linkerhand_l20_left.urdf

#   # Target refers to the retargeting target, which is the robot hand
#   target_joint_names: [ 'pinky_proximal_joint', 'ring_proximal_joint', 'middle_proximal_joint', 'index_proximal_joint',
#                         'thumb_proximal_pitch_joint', 'thumb_proximal_yaw_joint' ]
#   wrist_link_name: "hand_base_link"
#   finger_tip_link_names: [ "thumb_distal",  "index_distal", "middle_distal", "ring_distal", "pinky_distal" ]
#   scaling_factor: 1.15

#   # A smaller alpha means stronger filtering, i.e. more smooth but also larger latency
#   low_pass_alpha: 0.2
retargeting:
  type: DexPilot
  urdf_path: linkerhand_l20/right/linkerhand_l20_right.urdf

  target_joint_names:
    - pinky_mcp_roll
    - pinky_mcp_pitch
    - pinky_pip
    - ring_mcp_roll
    - ring_mcp_pitch
    - ring_pip
    - middle_mcp_roll
    - middle_mcp_pitch
    - middle_pip
    - index_mcp_roll
    - index_mcp_pitch
    - index_pip
    - thumb_cmc_yaw
    - thumb_cmc_roll
    - thumb_cmc_pitch
    - thumb_mcp

  wrist_link_name: hand_base_link

  finger_tip_link_names:
    - thumb_distal
    - index_distal
    - middle_distal
    - ring_distal
    - pinky_distal

  scaling_factor: 1.15
  low_pass_alpha: 0.2

  # Default
  has_joint_limits: true
  ignore_mimic_joint: false
  project_dist: 0.03